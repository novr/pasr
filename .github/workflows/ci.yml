name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  check-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: npm
      - run: npm ci
      - run: cp .dev.vars.example .dev.vars
      - run: npx wrangler types --check
      - run: npx wrangler d1 migrations apply pasr-db --local
      - run: npm run check
      - run: npm test
